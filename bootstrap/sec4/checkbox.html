<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkboxes - Bootstrap 5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <h4 class="mb-4">Checkbox Examples</h4>

            <form>
                <!-- Checkbox 1 - Normal (Checkbox on Left) -->
                <div class="form-check mb-3">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">
                        Remember me
                    </label>
                </div>

                <!-- Checkbox 2 - Reversed (Checkbox on Right) -->
                <div class="form-check form-check-reverse mb-3">
                    <input type="checkbox" class="form-check-input" id="terms" checked>
                    <label class="form-check-label" for="terms">
                        I agree to the Terms & Conditions
                    </label>
                </div>

                <!-- Checkbox 3 - Reversed -->
                <div class="form-check form-check-reverse">
                    <input type="checkbox" class="form-check-input" id="newsletter">
                    <label class="form-check-label" for="newsletter">
                        Subscribe to newsletter
                    </label>
                </div>

                <!-- Disabled Checkbox -->
                <div class="form-check form-check-reverse">
                    <input type="checkbox" class="form-check-input" id="disabled" disabled>
                    <label class="form-check-label" for="disabled">
                        This option is disabled
                    </label>
                </div>
            </form>

        </div>
    </div>
</div>

</body>
</html>
