<!DOCTYPE html>
<html>
<head>
    <title>Div and Span</title>
    <style>
        .box {
            background: lightgray;
            padding: 20px;
            margin: 10px;
        }

        .highlight {
            color: blue;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="box">
        This is a div container.
    </div>

    <p>
        This is a <span class="highlight">highlighted</span> word.
    </p>

</body>
</html>
