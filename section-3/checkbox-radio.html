<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckBox</title>
</head>
<body>
    <h1>Checkbox and Radio Buttons</h1>
    <h2>Favourite Programming Languages</h2>
    <form> 
        <label for="html"><input type="checkbox" name="language" id="html" value="html" checked disabled>Html</label><br>
        <label for="css"><input type="checkbox" name="language" id="css" value="css">Css</label><br>
        <label for="javascript"><input type="checkbox" name="language" id="javascript" value="javascript">JavaScript</label><br>
        <label for="python"><input type="checkbox" name="language" id="python" value="python">Python</label><br>
    </form>
    <h2>Product Sizes</h2>
    <form>
        <input type="radio" name="size" id="small" value="small">
        <label for="small"> 
            Small
        </label>
        <label for="medium"><input type="radio" name="size" id="medium" value="medium" checked>Medium</label>
        <label for="large"><input type="radio" name="size" id="large" value="large">Large</label><br>
</body>

</html>
