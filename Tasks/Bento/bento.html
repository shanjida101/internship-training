<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento Gallery Exact Match</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="outer-wrapper">
          
        <div class="inner-container">
         
         <div class="image">
              <h1 class="gallery-header">Gallery</h1>
             <div class="bento-grid">
                <div class="grid-item item-1">
                    <span class="number-overlay">1</span>
                    <img src="https://picsum.photos/400/600?random=1" alt="">
                </div>
                <div class="grid-item item-2">
                    <span class="number-overlay">2</span>
                    <img src="https://picsum.photos/800/400?random=2" alt="">
                </div>
                <div class="grid-item item-3">
                    <span class="number-overlay">3</span>
                    <img src="https://picsum.photos/400/400?random=3" alt="">
                </div>
                <div class="grid-item item-4">
                    <span class="number-overlay">4</span>
                    <img src="https://picsum.photos/400/600?random=4" alt="">
                </div>
                <div class="grid-item item-5">
                    <span class="number-overlay">5</span>
                    <img src="https://picsum.photos/400/400?random=5" alt="">
                </div>
                <div class="grid-item item-6">
                    <span class="number-overlay">6</span>
                    <img src="https://picsum.photos/600/400?random=6" alt="">
                </div>
         </div>
           
            </div>
        </div>

    </div>

</body>
</html>
