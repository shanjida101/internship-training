<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Table Example</title>
</head>
<body>

    <h1>Student Marks Table</h1>

    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Subject</th>
                <th>Marks</th>
                <th>Grade</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Rahim</td>
                <td>Math</td>
                <td>85</td>
                <td>A</td>
            </tr>

            <tr>
                <td>Karim</td>
                <td>Science</td>
                <td>78</td>
                <td>B+</td>
            </tr>

            <tr>
                <td>Sadia</td>
                <td>English</td>
                <td>92</td>
                <td>A+</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="4">End of Report</td>
            </tr>
        </tfoot>

    </table>

</body>
</html>
