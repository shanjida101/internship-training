<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Element Example</title>
</head>
<body>
    <h1>Video Element Example</h1>
<!--Basic video element
    <video controls width="600">
        <source src="./video.mp4" type="video/mp4">
        <source src="./video.webm" type="video/webm">
        Your browser does not support the video element.
    </video>
-->
<!--Autoplay and loop
    <video src="./video.mp4" type="video/mp4" controls autoplay loop width="500"></video>-->
<!--Using figure and figcaption
    <figure>
        <video src="./video.mp4" type="video/mp4" controls autoplay loop width="500"></video>
        <figcaption>My favorite video</figcaption>-->
<!--Mute-->
    <video src="./video.mp4" type="video/mp4" controls autoplay loop muted width="500"></video>

</body>
</html>
