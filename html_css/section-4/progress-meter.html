<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    progress, meter {
        width: 200px;
        height: 20px;
    } 
</style>
</head>
<body>
    <!-- Progress Meter -->
    <label for="progress">Progress:</label>
    <progress id="progress" value="70" max="100">70%</progress>
    <!--meter-->
    <label for="meter">Meter:</label>
    <meter id="meter" value="50" min="0" max="100" low="30" high="90" optimal="80">70%</meter>   

</body>
</html>
