<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors and Dates</title>
</head>
<body><form>
    <label for="color">Choose a color:    <input type="color" id="color" name="color" value="#ff0000"></label>
    <br><br>
    <label for="date">Choose a date:    <input type="date" id="date" name="date"></label>
    <div>
        <br><br>
        <label for="datetime-local">Choose a date and time:    <input type="datetime-local" id="datetime-local" name="datetime-local"></label>
    </div>
    <div>
        <br>
        <label for="month">Choose a month:    <input type="month" id="month" name="month"></label>
    </div>
    <div>
        <br>
        <label for="range">Range:  <input type="range" id="range" name="range" min="0" max="100" step="3"></label>
    </div>
    <div><br>
      <label for="Url">Enter a URL:    <input type="url" id="Url" name="Url"></label></div>
    <div><br><button>Submit</button></div><br>
    <input type="submit" value="Submit">
    </form>
</body>
</html>
