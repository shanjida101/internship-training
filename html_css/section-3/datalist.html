<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="favlanguages">Favorite Programming Languages:</label>
    <input list="languages" name="favlanguages">
    <datalist id="languages">
        <option value="Python">
        <option value="JavaScript">
        <option value="Java">
        <option value="C++">
        <option value="C#">
    </datalist>  
<label for="PopularHour">Popular Hours:</label>
<input type="time" list="PopularHour">
<datalist id="PopularHour">
    <option value="09:00">
    <option value="12:00">
    <option value="15:00">
    <option value="18:00">
</datalist>
<label for="tick">Tip</label>
<input type ="range" name="tick" id="tick" list="tickmarks" min="0" max="100" step="5">
<datalist id="tickmarks">
    <option value="0">
    <option value="25">
    <option value="50">
    <option value="75">
    <option value="100">
</datalist>
</body>
</html>
