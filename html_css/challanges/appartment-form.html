<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartment Search</title>
</head>
<body>
    <header>
        <h1>Apartment Search Form</h1>
        <form>
            <label for="location">Location:</label><br>
            <input type="text" id="location" name="location" placeholder="Enter city or neighborhood"><br><br>

            <div> 
                <label for="range">Budget Range:</label>
                <input type="range" id="range" list="tickmarks" min="0" max="5000" step="100">
                <datalist id="tickmarks">
                    <option value="0">
                    <option value="1000">
                    <option value="2000">
                    <option value="3000">
                    <option value="4000">
                    <option value="5000">
            </div>

                <br>
            <div>
                <label for="Bedrooms" >Number of Bedrooms:</label>
                <input type="number" id="Bedrooms" name="Bedrooms" min="1" max="10">
                
            </div>
            <br>
             <label for="bathroom">Number of Bathrooms:</label>
            <input type="number" id="bathroom" name="bathroom" min="1" max="10">
            <br><br>
            <label for ="animals">Pets Allowed:</label><br>
            <input type="checkbox" id="cat" name="cat" value="yes">Cat<br>
            <input type="checkbox" id="dog" name="dog" value="yes">Dog<br>  
            <input type="checkbox" id="bird" name="bird" value="yes">Bird<br> 
            <br>
           <label for="date">Preferred Move-in Date:</label><br>
           <input type="date" id="date" name="date">
            <br><br>
            <input type="submit" value="Search">
        </form>
    </header>
</body>
</html>
